<html lang="en">
  <head>

  </head>
  <body>

      <h1>Workshop supplies</h1>
      <article class="product-card">
        <h2 class="product-title">Cedar Notebook</h2>

        <img src="/images/cedar.jpg" alt="A cedar-colored notebook" width="640" height="480" />
