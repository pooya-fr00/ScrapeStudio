name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reject tracked private roadmap files
        run: pnpm check:private-files

      - name: Check frontend CSP compatibility
        run: pnpm check:security

      - name: Check production deployment policy
        run: pnpm check:deployment

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests
        run: pnpm test:integration

      - name: Install Chromium for end-to-end tests
        run: pnpm exec playwright install --with-deps chromium

      - name: Run end-to-end and accessibility tests
        run: pnpm test:e2e

      - name: Audit dependencies
        run: pnpm audit:dependencies

      - name: Build production artifacts
        run: pnpm build

      - name: Enforce production bundle budgets
        run: pnpm check:bundle

      - name: Check local documentation links
        run: pnpm check:docs
