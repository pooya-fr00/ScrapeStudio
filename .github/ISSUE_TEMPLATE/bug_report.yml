name: Bug report
description: Report a reproducible product defect without sharing private data.
title: 'bug: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve ScrapeStudio. Use bundled demos where possible and never include credentials or private URLs.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web interface
        - Extraction
        - API and secure fetch
        - Recipes, history, or export
        - Documentation
        - Deployment
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest safe sequence that reproduces the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and device
      placeholder: Chrome 126, Android 14
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This report contains no password, token, personal data, or private URL.
          required: true
