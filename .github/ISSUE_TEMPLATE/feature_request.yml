name: Feature request
description: Suggest an improvement within the free, public, responsible-use scope.
title: 'feat: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This request does not require accounts, payment, credentialed scraping, bypass behavior, or private-page access.
          required: true
