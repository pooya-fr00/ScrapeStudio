<!doctype html>
<html lang="en">
  <head>
    <title>Community garden harvest</title>
  </head>
  <body>
    <table aria-label="Harvest totals">
      <caption>
        July harvest
      </caption>
      <thead>
        <tr>
          <th rowspan="2">Plot</th>
          <th colspan="2">Weight</th>
          <th rowspan="2">Plot</th>
        </tr>
        <tr>
          <th>Vegetables</th>
          <th>Fruit</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>A1</td>
          <td>14 kg</td>
          <td>3 kg</td>
          <td>North</td>
        </tr>
        <tr>
          <td rowspan="2">B2</td>
          <td>9 kg</td>
          <td>5 kg</td>
          <td>East</td>
        </tr>
        <tr>
          <td colspan="2">12 kg combined</td>
          <td>South</td>
        </tr>
      </tbody>
    </table>
    <table title="Volunteer shifts">
      <tr>
        <td>Morning</td>
        <td>Leila</td>
      </tr>
      <tr>
        <td>Evening</td>
        <td>Arman</td>
      </tr>
    </table>
  </body>
</html>
